# Streamlit config
[server]
port = 8501
headless = false
enableXsrfProtection = true

[browser]
serverAddress = "localhost"

[client]
showSidebarNavigation = false

[theme]
primaryColor = "#2E7D32"
backgroundColor = "#F1F8E9"
secondaryBackgroundColor = "#E8F5E9"
textColor = "#1B5E20"
font = "sans serif"

[runner]
magicEnabled = true

[analytics]
enabled = false
